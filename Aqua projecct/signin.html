<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — AquaBridge</title>
  <style>
    :root {
      --deep:  #0a1a14;
      --dark:  #0f2318;
      --mid:   #163020;
      --teal:  #1a4a30;
      --green: #2d7a4f;
      --lime:  #4caf78;
      --amber: #e8a045;
      --cream: #f5f0e8;
      --white: #ffffff;
      --muted: #8aaa94;
      --border: rgba(255,255,255,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--deep);
      color: var(--cream);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%; max-width: 440px;
      padding: 2.5rem 2.5rem 2rem;
      position: relative; overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute; bottom: -80px; right: -80px;
      width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(45,122,79,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* logo */
    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 2rem;
      position: relative; z-index: 2;
    }

    .logo-icon {
      width: 32px; height: 32px; border-radius: 7px;
      background: rgba(76,175,120,0.15);
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }

    .logo-text { font-size: 1.1rem; font-weight: bold; color: var(--white); }
    .logo-text span { color: var(--amber); }

    .card-header { margin-bottom: 1.8rem; position: relative; z-index: 2; }

    .card-header h3 {
      font-size: 1.55rem; font-weight: normal;
      color: var(--white); margin-bottom: 0.3rem;
    }

    .card-header p {
      font-family: 'Courier New', monospace;
      font-size: 0.76rem; color: var(--muted);
    }

    .card-header p a {
      color: var(--lime); text-decoration: none; font-weight: bold;
    }

    .card-header p a:hover { color: #6dd494; }

    /* role toggle */
    .role-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.5rem; margin-bottom: 1.4rem;
      position: relative; z-index: 2;
    }

    .role-btn {
      padding: 0.6rem;
      background: var(--mid); border: 1px solid var(--border);
      border-radius: 6px; font-family: Georgia, serif;
      font-size: 0.82rem; color: var(--muted);
      cursor: pointer; transition: all 0.2s; text-align: center;
    }

    .role-btn.active {
      background: rgba(76,175,120,0.12);
      border-color: var(--lime); color: var(--lime);
    }

    /* role strip */
    .role-strip {
      border-left: 2px solid var(--lime);
      padding: 0.6rem 0.85rem;
      background: rgba(76,175,120,0.05);
      border-radius: 0 6px 6px 0;
      margin-bottom: 1.2rem;
      font-family: 'Courier New', monospace;
      font-size: 0.76rem; color: var(--muted); line-height: 1.5;
      transition: all 0.25s; position: relative; z-index: 2;
    }

    .role-strip.buyer {
      border-left-color: var(--amber);
      background: rgba(232,160,69,0.05);
    }

    /* google */
    .btn-google {
      width: 100%; padding: 0.72rem;
      background: transparent; color: var(--cream);
      border: 1px solid var(--border); border-radius: 6px;
      font-family: Georgia, serif; font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      position: relative; z-index: 2;
    }

    .btn-google:hover { border-color: var(--lime); color: var(--lime); }

    /* divider */
    .divider {
      display: flex; align-items: center; gap: 0.8rem;
      margin: 1rem 0; position: relative; z-index: 2;
    }

    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .divider span {
      font-family: 'Courier New', monospace;
      font-size: 0.7rem; color: var(--muted);
    }

    /* form */
    .form-group { margin-bottom: 0.9rem; position: relative; z-index: 2; }

    label {
      display: block; font-family: 'Courier New', monospace;
      font-size: 0.68rem; color: var(--muted);
      letter-spacing: 0.5px; text-transform: uppercase;
      margin-bottom: 0.32rem;
    }

    input {
      width: 100%; padding: 0.7rem 0.9rem;
      background: var(--mid); color: var(--cream);
      border: 1px solid var(--border); border-radius: 6px;
      font-family: Georgia, serif; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s;
    }

    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--lime); }

    /* pass */
    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 2.6rem; }

    .pass-eye {
      position: absolute; right: 0.8rem; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; font-size: 0.85rem;
      color: var(--muted); user-select: none; transition: color 0.2s;
    }

    .pass-eye:hover { color: var(--lime); }

    .forgot {
      display: flex; justify-content: flex-end; margin-top: 0.3rem;
    }

    .forgot a {
      font-family: 'Courier New', monospace;
      font-size: 0.7rem; color: var(--muted); text-decoration: none;
      transition: color 0.2s;
    }

    .forgot a:hover { color: var(--lime); }

    /* submit */
    .btn-submit {
      width: 100%; padding: 0.88rem; margin-top: 0.4rem;
      background: var(--lime); color: var(--deep);
      border: none; border-radius: 6px;
      font-family: Georgia, serif;
      font-size: 0.95rem; font-weight: bold;
      cursor: pointer; transition: all 0.2s;
      position: relative; z-index: 2;
    }

    .btn-submit:hover {
      background: #6dd494;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(76,175,120,0.25);
    }

    .back-link {
      display: block; text-align: center; margin-top: 1.3rem;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem; color: var(--muted); text-decoration: none;
      position: relative; z-index: 2;
    }

    .back-link:hover { color: var(--lime); }

    @media (max-width: 480px) {
      body { padding: 1rem; align-items: flex-start; padding-top: 2.5rem; }
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="card">

    <a href="index.html" class="logo">
      <div class="logo-icon">🐟</div>
      <span class="logo-text">Aqua<span>Bridge</span></span>
    </a>

    <div class="card-header">
      <h3>Welcome back</h3>
      <p>No account yet? <a href="signup.html">Create one here →</a></p>
    </div>

    <!-- ROLE TOGGLE -->
    <div class="role-toggle">
      <button class="role-btn active" id="btn-seller" onclick="setRole('seller')">🐟 Seller</button>
      <button class="role-btn" id="btn-buyer" onclick="setRole('buyer')">🛒 Buyer</button>
    </div>

    <!-- ROLE STRIP -->
    <div class="role-strip" id="role-strip">
      Sign in to your seller dashboard — manage listings, track orders, and view payouts.
    </div>

    <!-- GOOGLE -->
    <button class="btn-google">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or enter your details</span></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="pass-wrap">
        <input type="password" id="pass" placeholder="Enter your password" />
        <span class="pass-eye" onclick="togglePass()">👁</span>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>

    <button class="btn-submit" id="submit-btn" onclick="signIn()">Sign In as Seller</button>

    <a href="index.html" class="back-link">← Back to homepage</a>

  </div>

  <script>
    let role = 'seller';

    const strips = {
      seller: { text: 'Sign in to your seller dashboard — manage listings, track orders, and view payouts.', cls: '' },
      buyer:  { text: 'Sign in to your buyer account — browse listings, track deliveries, and manage orders.', cls: 'buyer' }
    };

    function setRole(r) {
      role = r;
      document.getElementById('btn-seller').classList.toggle('active', r === 'seller');
      document.getElementById('btn-buyer').classList.toggle('active', r === 'buyer');
      const s = strips[r];
      const strip = document.getElementById('role-strip');
      strip.textContent = s.text;
      strip.className = 'role-strip ' + s.cls;
      document.getElementById('submit-btn').textContent = r === 'seller' ? 'Sign In as Seller' : 'Sign In as Buyer';
    }

    function togglePass() {
      const i = document.getElementById('pass');
      const e = document.querySelector('.pass-eye');
      i.type = i.type === 'password' ? 'text' : 'password';
      e.textContent = i.type === 'password' ? '👁' : '🙈';
    }

    function signIn() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('pass').value;
      if (!email || !email.includes('@')) {
        flash('email'); return;
      }
      if (pass.length < 6) {
        flash('pass'); return;
      }
      window.location.href = role === 'seller' ? 'aqua-home.html' : 'aqua-home.html';
    }

    function flash(id) {
      const el = document.getElementById(id);
      el.style.borderColor = '#e8a045';
      el.focus();
      setTimeout(() => el.style.borderColor = '', 1500);
    }
  </script>

</body>
</html>
